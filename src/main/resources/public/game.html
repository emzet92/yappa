<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yappa – Planning Poker</title>

    <style>
        :root {
          --bg: #f8fafc;
          --panel: #ffffff;
          --border: #e5e7eb;
          --text: #111827;
          --muted: #6b7280;
          --primary: #4f46e5;
          --green: #10b981;
          --orange: #f59e0b;
          --red: #ef4444;
          --viewer: #3b82f6;
          --viewer-bg: #eff6ff;
        }

        * { box-sizing: border-box; }

        body {
          margin: 0;
          font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
          background: var(--bg);
          color: var(--text);
        }

        /* HEADER */

        header {
          background: white;
          border-bottom: 1px solid var(--border);
          padding: 20px 40px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        header h1 {
          margin: 0;
          font-size: 20px;
          font-weight: 600;
        }

        .room-id {
          font-size: 13px;
          color: var(--muted);
        }

        /* LAYOUT */

        .layout {
          display: grid;
          grid-template-columns: 1fr 320px;
          gap: 40px;
          padding: 40px;
        }

        /* USERS BAR (one line) */

        .users-bar {
          display: flex;
          flex-wrap: wrap;
          align-items: center;
          gap: 12px;
          margin-bottom: 30px;
        }

        .user-badge {
          display: flex;
          align-items: center;
          gap: 8px;
          background: white;
          padding: 6px 12px;
          border-radius: 999px;
          border: 1px solid var(--border);
          font-size: 13px;
        }

        .user-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--green);
        }

        .viewer-badge {
          display: flex;
          align-items: center;
          gap: 8px;
          background: var(--viewer-bg);
          padding: 6px 12px;
          border-radius: 999px;
          border: 1px solid #dbeafe;
          font-size: 13px;
          color: var(--viewer);
        }

        .viewer-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--viewer);
        }

        .separator {
          width: 1px;
          height: 20px;
          background: var(--border);
          margin: 0 8px;
        }

        /* VOTE AREA */

        .vote-area {
          background: white;
          border-radius: 20px;
          border: 1px solid var(--border);
          padding: 50px;
          min-height: 320px;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .cards {
          display: flex;
          gap: 40px;
          align-items: flex-start;
        }

        .card-group {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 12px;
        }

        .card {
          width: 100px;
          height: 150px;
          border-radius: 18px;
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 32px;
          font-weight: 700;
          color: white;
          box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .card.green { background: var(--green); }
        .card.orange { background: var(--orange); }
        .card.red { background: var(--red); }

        .card-users {
          display: flex;
          flex-direction: column;
          gap: 4px;
          font-size: 13px;
          color: var(--muted);
          text-align: center;
        }

        /* DECK */

        .deck {
          margin-top: 50px;
          display: flex;
          gap: 16px;
          justify-content: center;
        }

        .deck-card {
          width: 70px;
          height: 110px;
          border-radius: 16px;
          border: 1px solid var(--border);
          background: white;
          display: flex;
          justify-content: center;
          align-items: center;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.2s ease;
        }

        .deck-card:hover {
          border-color: var(--primary);
          transform: translateY(-4px);
          box-shadow: 0 6px 14px rgba(79,70,229,0.2);
        }

        .deck-card.selected {
          border-color: var(--primary);
          background: #eef2ff;
          color: var(--primary);
          transform: translateY(-8px);
          box-shadow: 0 8px 20px rgba(79,70,229,0.25);
        }

        .deck-card.inactive {
          opacity: 0.35;
          cursor: not-allowed;
          pointer-events: none;
        }

        /* SIDEBAR */

        .sidebar {
          display: flex;
          flex-direction: column;
          gap: 24px;
        }

        .panel {
          background: white;
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 24px;
        }

        .panel h3 {
          margin: 0 0 14px 0;
          font-size: 12px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          color: var(--muted);
        }

        .proposed {
          font-size: 56px;
          font-weight: 700;
          text-align: center;
        }

        /* BUTTONS */

        .button {
          width: 100%;
          padding: 10px;
          border-radius: 12px;
          border: none;
          font-weight: 600;
          cursor: pointer;
          margin-top: 10px;
          font-size: 14px;
        }

        .button.primary { background: var(--primary); color: white; }
        .button.secondary { background: #f3f4f6; }
        .button.danger { background: var(--red); color: white; }

        /* RESPONSIVE */

        @media (max-width: 1000px) {
          .layout {
            grid-template-columns: 1fr;
          }
        }
        /* DISABLED SECTION */

.disabled-section {
  position: relative;
  opacity: 0.55;
}

.disabled-section::after {
  content: "Read only";
  position: absolute;
  top: 12px;
  right: 16px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  background: #f3f4f6;
  padding: 4px 8px;
  border-radius: 999px;
  border: 1px solid var(--border);
}
.disabled-section button {
  pointer-events: none;
}
 /* TOOLTIP */

.custom-tooltip {
  position: fixed;
  background: #111827;
  color: white;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 6px;
  pointer-events: none;
  white-space: nowrap;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.15s ease;
}

.custom-tooltip.visible {
  opacity: 1;
}
    </style>
    <script>
        /* ---------------- COOKIE HELPERS ---------------- */

        function setParticipantCookie(roomId, participantId, name) {
          const value = JSON.stringify({ roomId, participantId, name });
          document.cookie = `yappa_participant=${encodeURIComponent(value)}; path=/; max-age=86400; SameSite=Lax`;
        }

        function getParticipantCookie(roomId) {
          const match = document.cookie.split(';')
            .map(c => c.trim())
            .find(c => c.startsWith('yappa_participant='));
          if (!match) return null;
          try {
            const data = JSON.parse(decodeURIComponent(match.slice('yappa_participant='.length)));
            return data.roomId === roomId ? data : null;
          } catch {
            return null;
          }
        }

        let currentParticipant = null;
        let currentRoomId = null;

        /* ---------------- LOAD ROOM ---------------- */

        async function loadRoom(roomId) {
          try {
            const response = await fetch(`/room/${roomId}`);
            if (!response.ok) throw new Error("Room not found");
            const room = await response.json();
            renderRoom(room);
          } catch (err) {
            console.error(err);
            alert("Failed to load room");
          }
        }

        /* ---------------- VOTE / START VOTING ---------------- */

        async function submitVote(value) {
          const res = await fetch(`/room/${currentRoomId}/vote`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ participantId: currentParticipant.participantId, value })
          });
          if (!res.ok) throw new Error("Vote failed");
          return res.json();
        }

        async function startVoting() {
          const res = await fetch(`/room/${currentRoomId}`, { method: "PUT" });
          if (!res.ok) throw new Error("Start voting failed");
          return res.json();
        }

        document.addEventListener("DOMContentLoaded", async () => {

          /* ---------------- TOOLTIP ---------------- */

          const tooltip = document.createElement("div");
          tooltip.className = "custom-tooltip";
          tooltip.textContent = "Not Implemented yet";
          document.body.appendChild(tooltip);

          document.querySelectorAll(".disabled-section").forEach(section => {
            section.addEventListener("mouseenter", () => tooltip.classList.add("visible"));
            section.addEventListener("mouseleave", () => tooltip.classList.remove("visible"));
            section.addEventListener("mousemove", e => {
              tooltip.style.left = e.clientX + 12 + "px";
              tooltip.style.top = e.clientY + 12 + "px";
            });
          });

          /* ---------------- INIT ---------------- */

          const params = new URLSearchParams(window.location.search);
          const roomId = params.get("id");

          if (!roomId) {
            alert("Missing room id in URL");
            return;
          }

          currentParticipant = getParticipantCookie(roomId);
          currentRoomId = roomId;

          if (!currentParticipant) {
            document.getElementById("joinModal").style.display = "grid";
          } else {
            await loadRoom(roomId);
            setInterval(() => loadRoom(roomId), 3000);
          }

          /* ---------------- JOIN HANDLER ---------------- */

          document.getElementById("joinBtn").addEventListener("click", async () => {
            const name = document.getElementById("joinName").value.trim();
            if (!name) return;

            try {
              const res = await fetch(`/room/${roomId}/join`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ name })
              });

              if (!res.ok) { alert("Failed to join room"); return; }

              const room = await res.json();
              const me = room.participants.find(p => p.name === name);
              if (me) {
                setParticipantCookie(roomId, me.id, me.name);
                currentParticipant = { participantId: me.id, name: me.name };
              }

              document.getElementById("joinModal").style.display = "none";
              renderRoom(room);
            } catch (err) {
              console.error(err);
              alert("Something went wrong");
            }
          });
        });

        /* ---------------- RENDER ---------------- */

        function renderRoom(room) {
          document.querySelector(".room-id").textContent = "Room: " + room.id;
          renderParticipants(room);
          renderVotes(room);
          renderProposed(room);
          renderDeck(room);
          renderControls(room);
        }

        /* ---------------- DECK ---------------- */

        function renderDeck(room) {
          const isVoting = !!room.currentRoundResponse;
          const myVote = currentParticipant && room.currentRoundResponse?.votes?.[currentParticipant.participantId];

          document.querySelectorAll(".deck-card").forEach(card => {
            const value = card.textContent.trim();
            card.classList.toggle("selected", value === myVote);
            card.classList.toggle("inactive", !isVoting);
            card.onclick = isVoting ? async () => {
              try {
                renderRoom(await submitVote(value));
              } catch (e) {
                console.error("Vote error:", e);
              }
            } : null;
          });
        }

        /* ---------------- CONTROLS ---------------- */

        function renderControls(room) {
          const panel = document.querySelector(".controls-panel");
          const isVoting = !!room.currentRoundResponse;
          panel.innerHTML = "<h3>Host Controls</h3>";

          if (!isVoting) {
            const btn = document.createElement("button");
            btn.className = "button primary";
            btn.textContent = "Start Voting";
            btn.onclick = async () => {
              try {
                renderRoom(await startVoting());
              } catch (e) {
                console.error("Start voting error:", e);
              }
            };
            panel.appendChild(btn);
          } else {
            const info = document.createElement("p");
            info.style = "font-size:14px;color:var(--muted);text-align:center;margin:8px 0 0;";
            info.textContent = "Voting in progress…";
            panel.appendChild(info);
          }
        }

        /* ---------------- PARTICIPANTS ---------------- */

        function renderParticipants(room) {

          const usersBar = document.querySelector(".users-bar");
          usersBar.innerHTML = "";

          room.participants.forEach(p => {
            const badge = document.createElement("div");
            badge.className = "user-badge";
            badge.innerHTML = `
              <div class="user-dot"></div> ${p.name}
            `;
            usersBar.appendChild(badge);
          });
        }

        /* ---------------- VOTES ---------------- */

        function renderVotes(room) {

          const voteArea = document.querySelector(".cards");
          voteArea.innerHTML = "";

          if (!room.currentRoundResponse || !room.currentRoundResponse.votes) {
            return;
          }

          const votes = room.currentRoundResponse.votes;

          // grupujemy participantów po wartości głosu
          const grouped = {};

          for (const participantId in votes) {
            const value = votes[participantId];

            if (!grouped[value]) {
              grouped[value] = [];
            }

            const participant = room.participants.find(p => p.id === participantId);
            if (participant) {
              grouped[value].push(participant.name);
            }
          }

          Object.keys(grouped).forEach(value => {

            const group = document.createElement("div");
            group.className = "card-group";

            const card = document.createElement("div");
            card.className = "card " + getCardColor(value);
            card.textContent = value;

            const users = document.createElement("div");
            users.className = "card-users";

            grouped[value].forEach(name => {
              const span = document.createElement("span");
              span.textContent = name;
              users.appendChild(span);
            });

            group.appendChild(card);
            group.appendChild(users);

            voteArea.appendChild(group);
          });
        }

        /* ---------------- PROPOSED ---------------- */

        function renderProposed(room) {

          const proposedEl = document.querySelector(".proposed");

          const votes = room.currentRoundResponse?.votes;
          if (!votes || Object.keys(votes).length === 0) {
            proposedEl.textContent = "-";
            return;
          }

          const values = Object.values(votes)
            .map(v => parseInt(v))
            .filter(v => !isNaN(v));

          if (values.length === 0) {
            proposedEl.textContent = "-";
            return;
          }

          const avg = Math.round(values.reduce((a, b) => a + b, 0) / values.length);
          proposedEl.textContent = avg;
        }

        /* ---------------- CARD COLOR ---------------- */

        function getCardColor(value) {
          const num = parseInt(value);

          if (isNaN(num)) return "green";
          if (num <= 3) return "green";
          if (num <= 8) return "orange";
          return "red";
        }
    </script>
</head>

<body>

<!-- JOIN MODAL -->

  <div style="background:white; border-radius:14px; padding:32px; width:min(400px,90%); box-shadow:0 20px 40px rgba(0,0,0,0.15);">
    <h2 style="margin:0 0 8px; font-size:18px; font-weight:600;">Join Room</h2>
    <p style="margin:0 0 20px; color:#6b7280; font-size:14px; line-height:1.4;">Enter your name to join this planning session.</p>
    <label style="display:block; font-size:13px; margin-bottom:6px; color:#374151;">Your name</label>
    <input id="joinName" type="text" placeholder="e.g. Alice" autocomplete="off"

      style="width:100%; padding:10px; border:none; border-radius:10px; background:#4f46e5; color:white; font-weight:600; cursor:pointer; font-size:14px;">

  </div>
</div>

<header>

</header>

</div>

</body>
