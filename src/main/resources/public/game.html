<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yappa – Planning Poker</title>
    <link rel="stylesheet" href="/static/game.css" />
</head>

<body>

<!-- JOIN MODAL -->
<div id="joinModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; place-items:center;">
  <div style="background:white; border-radius:14px; padding:32px; width:min(400px,90%); box-shadow:0 20px 40px rgba(0,0,0,0.15);">
    <h2 style="margin:0 0 8px; font-size:18px; font-weight:600;">Join Room</h2>
    <p style="margin:0 0 20px; color:#6b7280; font-size:14px; line-height:1.4;">Enter your name to join this planning session.</p>
    <label style="display:block; font-size:13px; margin-bottom:6px; color:#374151;">Your name</label>
    <input id="joinName" type="text" placeholder="e.g. Alice" autocomplete="off"
      style="width:100%; box-sizing:border-box; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; font-size:14px; outline:none; margin-bottom:16px;" />
    <button id="joinBtn"
      style="width:100%; padding:10px; border:none; border-radius:10px; background:#4f46e5; color:white; font-weight:600; cursor:pointer; font-size:14px;">
      Join
    </button>
  </div>
</div>

<header>
    <h1>Planning Poker</h1>
    <div class="room-id">Room: …</div>
</header>

<div class="layout">

    <div>

        <div class="users-bar"></div>

        <div class="vote-area">
            <div class="cards"></div>
        </div>

        <div class="deck">
            <div class="deck-card">1</div>
            <div class="deck-card">2</div>
            <div class="deck-card">3</div>
            <div class="deck-card">5</div>
            <div class="deck-card">8</div>
            <div class="deck-card">13</div>
            <div class="deck-card">21</div>
        </div>

    </div>

    <div class="sidebar">

        <div class="panel">
            <h3>Proposed estimation</h3>
            <div class="proposed">-</div>
        </div>

        <div class="panel disabled-section">
            <h3>Story</h3>
            <p style="font-size:14px; color: var(--muted); line-height:1.5;">
            TD-420 Dummy placeholder
            </p>
        </div>

        <div class="panel controls-panel">
            <h3>Host Controls</h3>
        </div>

    </div>

</div>

<script src="/static/game.js"></script>
</body>
</html>
