<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yappa – Planning Poker</title>

    <style>
        :root {
          --bg: #f8fafc;
          --panel: #ffffff;
          --border: #e5e7eb;
          --text: #111827;
          --muted: #6b7280;
          --primary: #4f46e5;
          --green: #10b981;
          --orange: #f59e0b;
          --red: #ef4444;
        }

        * { box-sizing: border-box; }

        body {
          margin: 0;
          font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
          background: var(--bg);
          color: var(--text);
        }

        /* HEADER */

        header {
          background: white;
          border-bottom: 1px solid var(--border);
          padding: 20px 40px;
          display: flex;
          justify-content: space-between;
          align-items: center;
        }

        header h1 {
          margin: 0;
          font-size: 20px;
          font-weight: 600;
        }

        .room-id {
          font-size: 13px;
          color: var(--muted);
        }

        /* LAYOUT */

        .layout {
          display: grid;
          grid-template-columns: 1fr 320px;
          gap: 40px;
          padding: 40px;
        }

        /* USERS */

        .users {
          display: flex;
          gap: 12px;
          flex-wrap: wrap;
          margin-bottom: 24px;
        }

        .user-badge {
          display: flex;
          align-items: center;
          gap: 8px;
          background: white;
          padding: 6px 12px;
          border-radius: 999px;
          border: 1px solid var(--border);
          font-size: 13px;
        }

        .user-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--green);
        }

        /* VOTE AREA */

        .vote-area {
          background: white;
          border-radius: 20px;
          border: 1px solid var(--border);
          padding: 50px;
          min-height: 320px;
          display: flex;
          justify-content: center;
          align-items: center;
        }

        .cards {
          display: flex;
          gap: 28px;
        }

        .card {
          width: 100px;
          height: 150px;
          border-radius: 18px;
          display: flex;
          justify-content: center;
          align-items: center;
          font-size: 32px;
          font-weight: 700;
          color: white;
          box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        .card.green { background: var(--green); }
        .card.orange { background: var(--orange); }
        .card.red { background: var(--red); }

        /* DECK */

        .deck {
          margin-top: 40px;
          display: flex;
          gap: 16px;
          justify-content: center;
        }

        .deck-card {
          width: 70px;
          height: 110px;
          border-radius: 16px;
          border: 1px solid var(--border);
          background: white;
          display: flex;
          justify-content: center;
          align-items: center;
          font-weight: 600;
          cursor: pointer;
          transition: all 0.2s ease;
        }

        .deck-card:hover {
          border-color: var(--primary);
          transform: translateY(-4px);
          box-shadow: 0 6px 14px rgba(79,70,229,0.2);
        }

        /* SIDEBAR */

        .sidebar {
          display: flex;
          flex-direction: column;
          gap: 24px;
        }

        .panel {
          background: white;
          border: 1px solid var(--border);
          border-radius: 20px;
          padding: 24px;
        }

        .panel h3 {
          margin: 0 0 14px 0;
          font-size: 12px;
          text-transform: uppercase;
          letter-spacing: 0.5px;
          color: var(--muted);
        }

        .proposed {
          font-size: 56px;
          font-weight: 700;
          text-align: center;
        }

        /* BUTTONS */

        .button {
          width: 100%;
          padding: 10px;
          border-radius: 12px;
          border: none;
          font-weight: 600;
          cursor: pointer;
          margin-top: 10px;
          font-size: 14px;
        }

        .button.primary {
          background: var(--primary);
          color: white;
        }

        .button.secondary {
          background: #f3f4f6;
        }

        .button.danger {
          background: var(--red);
          color: white;
        }

        /* RESPONSIVE */

        @media (max-width: 1000px) {
          .layout {
            grid-template-columns: 1fr;
          }
        }
    </style>
</head>

<body>

<header>
    <h1>Planning Poker</h1>
    <div class="room-id">Room: sprint-42</div>
</header>

<div class="layout">

    <div>

        <div class="users">
            <div class="user-badge"><div class="user-dot"></div> Mateusz</div>
            <div class="user-badge"><div class="user-dot"></div> Andrew</div>
            <div class="user-badge"><div class="user-dot"></div> Zack</div>
        </div>

        <div class="vote-area">
            <div class="cards">
                <div class="card green">1</div>
                <div class="card orange">5</div>
                <div class="card red">21</div>
            </div>
        </div>

        <div class="deck">
            <div class="deck-card">1</div>
            <div class="deck-card">2</div>
            <div class="deck-card">3</div>
            <div class="deck-card">5</div>
            <div class="deck-card">8</div>
            <div class="deck-card">13</div>
            <div class="deck-card">21</div>
        </div>

    </div>

    <div class="sidebar">

        <div class="panel">
            <h3>Proposed estimation</h3>
            <div class="proposed">13</div>
        </div>

        <div class="panel">
            <h3>Story</h3>
            <p style="font-size:14px; color: var(--muted); line-height:1.5;">
                DXF-12345 – Add authentication middleware with JWT validation and refresh token support.
            </p>
        </div>

        <div class="panel">
            <h3>Host Controls</h3>
            <button class="button primary">Reveal cards</button>
            <button class="button secondary">Next story</button>
            <button class="button danger">End game</button>
        </div>

    </div>

</div>

</body>
</html>
