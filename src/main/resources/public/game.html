<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yappa – Nowy pokój</title>
    <style>
        :root { color-scheme: light; }
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
          background: #f6f7fb;
          color: #111827;
          padding: 24px;
        }
        .card {
          width: min(420px, 100%);
          background: #ffffff;
          border: 1px solid #e5e7eb;
          border-radius: 14px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.06);
          padding: 22px;
        }
        h1 {
          margin: 0 0 6px 0;
          font-size: 20px;
          letter-spacing: -0.01em;
        }
        p {
          margin: 0 0 18px 0;
          color: #6b7280;
          font-size: 14px;
          line-height: 1.4;
        }
        label {
          display: block;
          font-size: 13px;
          margin: 12px 0 6px;
          color: #374151;
        }
        input {
          width: 100%;
          box-sizing: border-box;
          padding: 10px 12px;
          border: 1px solid #d1d5db;
          border-radius: 10px;
          font-size: 14px;
          outline: none;
          background: #fff;
        }
        input:focus {
          border-color: #6366f1;
          box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
        }
        .row {
          display: grid;
          gap: 12px;
        }
        .actions {
          margin-top: 16px;
          display: grid;
          gap: 10px;
        }
        button {
          width: 100%;
          padding: 10px 12px;
          border: 0;
          border-radius: 10px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          background: #4f46e5;
          color: white;
        }
        button:hover { background: #4338ca; }
        .hint {
          font-size: 12px;
          color: #6b7280;
          text-align: center;
          margin-top: 10px;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>This is the game</h1>
</main>
</body>
</html>
