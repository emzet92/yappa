<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yappa – Nowy pokój</title>
    <link rel="stylesheet" href="/static/index.css" />
</head>
<body>
<main class="card">
    <h1>Utwórz nowy pokój</h1>
    <p>Podaj nazwę pokoju i swój nick, żeby rozpocząć planning poker.</p>

    <form id="createRoomForm" method="post" action="/game">
        <div class="row">
            <div>
                <label for="roomName">Nazwa pokoju</label>
                <input
                        id="roomName"
                        name="roomName"
                        type="text"
                        placeholder="np. Sprint 12 – Refinement"
                        required
                        minlength="2"
                        maxlength="80"
                        autocomplete="off"
                />
            </div>

            <div>
                <label for="ownerName">Nick</label>
                <input
                        id="ownerName"
                        name="ownerName"
                        type="text"
                        placeholder="np. Mateusz"
                        required
                        minlength="2"
                        maxlength="32"
                        autocomplete="ownerName"
                />
            </div>
        </div>

        <div class="actions">
            <button type="submit">Utwórz pokój</button>
        </div>

        <div class="hint">Po utworzeniu dostaniesz link do udostępnienia zespołowi.</div>
    </form>
</main>
<script src="/static/index.js"></script>
</body>
</html>
