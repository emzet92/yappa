<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yappa – Nowy pokój</title>
    <style>
        :root { color-scheme: light; }
        body {
          margin: 0;
          min-height: 100vh;
          display: grid;
          place-items: center;
          font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
          background: #f6f7fb;
          color: #111827;
          padding: 24px;
        }
        .card {
          width: min(420px, 100%);
          background: #ffffff;
          border: 1px solid #e5e7eb;
          border-radius: 14px;
          box-shadow: 0 10px 30px rgba(0,0,0,0.06);
          padding: 22px;
        }
        h1 {
          margin: 0 0 6px 0;
          font-size: 20px;
          letter-spacing: -0.01em;
        }
        p {
          margin: 0 0 18px 0;
          color: #6b7280;
          font-size: 14px;
          line-height: 1.4;
        }
        label {
          display: block;
          font-size: 13px;
          margin: 12px 0 6px;
          color: #374151;
        }
        input {
          width: 100%;
          box-sizing: border-box;
          padding: 10px 12px;
          border: 1px solid #d1d5db;
          border-radius: 10px;
          font-size: 14px;
          outline: none;
          background: #fff;
        }
        input:focus {
          border-color: #6366f1;
          box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.18);
        }
        .row {
          display: grid;
          gap: 12px;
        }
        .actions {
          margin-top: 16px;
          display: grid;
          gap: 10px;
        }
        button {
          width: 100%;
          padding: 10px 12px;
          border: 0;
          border-radius: 10px;
          font-size: 14px;
          font-weight: 600;
          cursor: pointer;
          background: #4f46e5;
          color: white;
        }
        button:hover { background: #4338ca; }
        .hint {
          font-size: 12px;
          color: #6b7280;
          text-align: center;
          margin-top: 10px;
        }
    </style>
</head>
<body>
<main class="card">
    <h1>Utwórz nowy pokój</h1>
    <p>Podaj nazwę pokoju i swój nick, żeby rozpocząć planning poker.</p>

    <form id="createRoomForm" method="post" action="/game">
        <div class="row">
            <div>
                <label for="roomName">Nazwa pokoju</label>
                <input
                        id="roomName"
                        name="roomName"
                        type="text"
                        placeholder="np. Sprint 12 – Refinement"
                        required
                        minlength="2"
                        maxlength="80"
                        autocomplete="off"
                />
            </div>

            <div>
                <label for="ownerName">Nick</label>
                <input
                        id="ownerName"
                        name="ownerName"
                        type="text"
                        placeholder="np. Mateusz"
                        required
                        minlength="2"
                        maxlength="32"
                        autocomplete="ownerName"
                />
            </div>
        </div>

        <div class="actions">
            <button type="submit">Utwórz pokój</button>
        </div>

        <div class="hint">Po utworzeniu dostaniesz link do udostępnienia zespołowi.</div>
    </form>
</main>
<script>
    function setParticipantCookie(roomId, participantId, name) {
      const value = JSON.stringify({ participantId, name });
      document.cookie = `participant_${roomId}=${encodeURIComponent(value)}; path=/; max-age=86400`;
    }

    document.getElementById("createRoomForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const roomName = document.getElementById("roomName").value.trim();
      const nickname = document.getElementById("ownerName").value.trim();

      if (!roomName || !nickname) {
        alert("Both fields are required");
        return;
      }

      try {
        const response = await fetch("/room", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            roomName: roomName,
            ownerName: nickname
          })
        });

        if (!response.ok) {
          const text = await response.text();
          alert("Failed to create room: " + text);
          return;
        }

        const data = await response.json();

        // Owner is automatically added as the first participant
        const me = data.participants.find(p => p.name === nickname) || data.participants[0];
        if (me) {
          setParticipantCookie(data.id, me.id, me.name);
        }

        window.location.href = `/game?id=${data.id}`;

      } catch (error) {
        console.error("Error creating room:", error);
        alert("Something went wrong");
      }
    });
</script>
</body>
</html>
